<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トレンドまとめ 2026</title>
  <meta name="description" content="Z世代の最新トレンドをファッション・美容・グルメ・音楽・SNS・ライフスタイルまで網羅的にまとめたフィードリーダー">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Mobile header -->
  <header class="mobile-header">
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
    <h1 class="mobile-title">トレンドまとめ 2026</h1>
  </header>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-logo">トレンドまとめ</h1>
        <span class="sidebar-year">2026</span>
      </div>
      <div class="sidebar-meta">2026年3月調査</div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all">
          <span class="nav-icon">&#x1f4e1;</span>
          <span class="nav-label">すべてのフィード</span>
          <span class="nav-count" id="count-all"></span>
        </button>

        <div class="nav-group">
          <div class="nav-group-header" data-group="girls">
            <span class="nav-icon">&#x1f469;</span>
            <span class="nav-label">女子トレンド</span>
            <span class="nav-chevron">&#9662;</span>
          </div>
          <div class="nav-group-items" id="nav-girls"></div>
        </div>

        <div class="nav-group">
          <div class="nav-group-header" data-group="boys">
            <span class="nav-icon">&#x1f468;</span>
            <span class="nav-label">男子トレンド</span>
            <span class="nav-chevron">&#9662;</span>
          </div>
          <div class="nav-group-items" id="nav-boys"></div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-sources">
          データソース: SHIBUYA109 lab. / Trepo / @cosme / CanCam / fasme / WE LABO / VOCE / OTOKOMAE / ホットペッパービューティー
        </div>
      </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main feed -->
    <main class="feed-main">
      <div class="feed-toolbar">
        <h2 class="feed-title" id="feed-title">すべてのフィード</h2>
        <div class="feed-actions">
          <div class="search-box">
            <span class="search-icon">&#x1f50d;</span>
            <input type="text" id="search-input" placeholder="検索..." class="search-input">
          </div>
          <button id="view-toggle" class="view-toggle" title="表示切替">
            <span class="view-icon" id="view-icon">&#9776;</span>
          </button>
        </div>
      </div>

      <!-- Keyword filter bar -->
      <div id="keyword-bar" class="keyword-bar" style="display:none;">
        <span class="keyword-bar-label">キーワード絞り込み:</span>
        <span id="keyword-label" class="keyword-bar-value"></span>
        <button id="keyword-clear" class="keyword-bar-clear">&#x2715; 解除</button>
      </div>

      <div id="feed-list" class="feed-list"></div>

      <div id="feed-empty" class="feed-empty" style="display:none;">
        該当するトレンドがありません
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
